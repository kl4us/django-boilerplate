{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ BRAND_NAME }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-9">
        <article class="p-4 p-md-5 bg-white border rounded-3 shadow-sm">
            <h1 class="display-4 fw-bold mb-4">{{ page.title }}</h1>
            <hr class="mb-5">
            
            <div class="cms-content">
                {{ page.content|safe }}
            </div>
        </article>
    </div>
</div>
{% endblock %}
